<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - All Animation Studio</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css_style/nevbar.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* BACKGROUND UTAMA: HITAM PEKAT */
    body {
      background-color: #050608;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* NAVBAR UTAMA */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(13, 15, 19, 0.75);
      backdrop-filter: blur(8px);
      padding: 12px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0, 243, 255, 0.15);
      border-bottom: 1px solid rgba(102, 252, 241, 0.25);
      height: 70px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      flex-grow: 1;
      height: 100%;
    }

    /* TOMBOL MENU / GARIS TIGA */
    .menu-toggle {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      width: 40px;
      height: 40px;
      background-color: rgba(102, 252, 241, 0.03);
      border-radius: 50%;
      border: 1px solid rgba(102, 252, 241, 0.25);
      flex-shrink: 0;
      z-index: 1010;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .menu-toggle:hover { background-color: rgba(102, 252, 241, 0.12); box-shadow: 0 0 15px rgba(102, 252, 241, 0.35); }
    .menu-toggle span { width: 18px; height: 2px; background-color: #66fcf1; border-radius: 2px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    
    .menu-toggle.active-btn span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .menu-toggle.active-btn span:nth-child(2) { opacity: 0; transform: scale(0); }
    .menu-toggle.active-btn span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    /* MENU DROPDOWN */
    .dropdown-menu {
      position: absolute;
      top: 75px; right: 20px;
      background-color: #12141c;
      border: 1px solid #66fcf1;
      border-radius: 12px;
      width: 200px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.65), 0 0 15px rgba(102, 252, 241, 0.15);
      overflow: hidden;
      z-index: 1000;
      opacity: 0;
      transform: translateY(-25px) scale(0.93);
      pointer-events: none;
      transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .dropdown-menu.active { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    .dropdown-menu a { display: block; color: white; padding: 14px 20px; text-decoration: none; font-size: 0.95rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s; cursor: pointer; }
    .dropdown-menu a:hover { background-color: rgba(102, 252, 241, 0.08); color: #66fcf1; padding-left: 26px; }

    /* HERO WRAPPER FORM */
    .hero-wrapper {
      min-height: calc(100vh - 70px); 
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      background: radial-gradient(circle at center, #0d1117 0%, #050608 100%);
    }

    .login-form-wrapper {
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 3px;
      margin-bottom: 35px;
      color: #ffffff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
    }

    /* Opsi Input Neon Modern */
    .custom-input-box {
      width: 100%;
      position: relative;
      margin-bottom: 25px;
    }

    .custom-input-box input {
      width: 100%;
      padding: 15px 50px 15px 18px; 
      background: rgba(18, 20, 28, 0.6);
      border: 1px solid rgba(102, 252, 241, 0.2);
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      font-family: sans-serif;
      outline: none;
      transition: all 0.3s ease;
    }

    .custom-input-box input:focus {
      border-color: #66fcf1;
      box-shadow: 0 0 12px rgba(102, 252, 241, 0.3);
    }

    .custom-input-box label {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
      letter-spacing: 1.5px;
      font-family: 'Orbitron', sans-serif;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .custom-input-box input:focus ~ label,
    .custom-input-box input:not(:placeholder-shown) ~ label {
      top: -10px;
      left: 12px;
      background: #060810;
      padding: 0 6px;
      color: #66fcf1;
      font-size: 10px;
    }

    /* TOMBOL INTIP PASSWORD (EYE TOGGLE) */
    .toggle-password-btn {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(102, 252, 241, 0.6);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      outline: none;
      transition: color 0.3s ease;
      z-index: 10;
    }

    .toggle-password-btn:hover {
      color: #66fcf1;
    }

    /* Tombol Sign-In Efek Aliran Pelangi */
    .btn-submit-rainbow {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 8px;
      color: #ffffff;
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      background: linear-gradient(90deg, #ff0055, #00ffcc, #9900ff, #ffcc00, #ff0055);
      background-size: 300% 100%;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
      animation: rainbowBtnShift 4s linear infinite;
    }

    .btn-submit-rainbow:hover {
      transform: scale(1.01);
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
    }

    @keyframes rainbowBtnShift {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    .back-login-link {
      display: inline-block;
      margin-top: 25px;
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 2px;
      font-family: 'Orbitron', sans-serif;
      transition: color 0.3s ease;
    }

    .back-login-link:hover {
      color: #66fcf1;
    }

    /* =========================================================================
       STYLE ELEMEN PEMBATAL DAN BUTTON GOOGLE REGISTRATION (FIX WARNA & LAYOUT)
       ========================================================================= */
    .divider-container {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 25px 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(102, 252, 241, 0.15);
    }
    .divider-text {
      padding: 0 15px;
      color: rgba(255, 255, 255, 0.25);
      font-size: 10px;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 2px;
    }
    .btn-google-neon {
      width: 100%;
      padding: 14px;
      background: rgba(18, 20, 28, 0.5);
      border: 1px solid rgba(102, 252, 241, 0.2);
      border-radius: 8px;
      color: #ffffff;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.3s ease;
    }
    .btn-google-neon:hover {
      background: rgba(255, 255, 255, 0.03);
      border-color: #00ffcc;
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo-area">
      <div class="logo-aa-container">
        <span class="char-a a-normal">A</span>
        <span class="char-a a-flipped">A</span>
      </div>
      
      <div class="text-wrapper">
        <span class="logo-text-top">
          <span class="gold-a">A</span>LL <span class="gold-a">A</span>NIMATION
        </span>
        <span class="logo-text-bottom">STUDIO</span>
      </div>
    </div>    

    <div class="menu-toggle" id="menuBtn"><span></span><span></span><span></span></div>
    <div class="dropdown-menu" id="dropdownMenu">
      <a href="index">🏠 Beranda</a>
      <a href="Animasi Studio/studio">🎬 Animasi Studio</a>
      <a href="Login">🔙 Login</a> 
    </div>
  </header>

  <section class="hero-wrapper">
    <div class="login-form-wrapper">
      <h2 class="login-title">USER REGISTER</h2>

      <form id="registerForm">
        <div class="custom-input-box">
          <input type="text" id="username" placeholder=" " required autocomplete="off">
          <label for="username">USERNAME</label>
        </div>

        <div class="custom-input-box">
          <input type="email" id="email" placeholder=" " required autocomplete="off">
          <label for="email">EMAIL ADDRESS</label>
        </div>

        <div class="custom-input-box">
          <input type="password" id="password" placeholder=" " required>
          <label for="password">PASSWORD</label>
          <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('password', this)">👁️</button>
        </div>

        <div class="custom-input-box">
          <input type="password" id="confirmPassword" placeholder=" " required>
          <label for="confirmPassword">CONFIRM PASSWORD</label>
          <button type="button" class="toggle-password-btn" onclick="togglePasswordVisibility('confirmPassword', this)">👁️</button>
        </div>

        <button type="submit" class="btn-submit-rainbow">Register</button>
      </form>

      <a href="Login" class="back-login-link">already have an account? login</a>

      <div class="divider-container">
        <div class="divider-line"></div>
        <div class="divider-text">OR</div>
        <div class="divider-line"></div>
      </div>

      <button type="button" class="btn-google-neon" id="btnGoogleRegister">
        <svg width="18" height="18" viewBox="0 0 24 24" style="display: inline-block; vertical-align: middle;">
          <path fill="#4285F4" d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v3.92h6.61c-.29 1.53-1.14 2.82-2.4 3.68v3.05h3.88c2.27-2.09 3.65-5.17 3.65-8.58z"/>
          <path fill="#34A853" d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.88-3.05c-1.08.72-2.45 1.16-4.05 1.16-3.11 0-5.74-2.11-6.68-4.96H1.21v3.15C3.18 21.88 7.31 24 12 24z"/>
          <path fill="#FBBC05" d="M5.32 14.24A7.16 7.16 0 0 1 5 12c0-.79.13-1.57.32-2.34V6.51H1.21A11.94 11.94 0 0 0 0 12c0 1.92.45 3.74 1.21 5.39l4.11-3.15z"/>
          <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.24 0 12 0 7.31 0 3.18 2.12 1.21 5.61l4.11 3.15c.94-2.85 3.57-4.96 6.68-4.96z"/>
        </svg>
        REGISTER VIA GOOGLE
      </button>

    </div>
  </section>

  <script type="module">
    // 1. KONTROL TAMPILAN NAVBAR DROPDOWN
const menuBtn = document.getElementById('menuBtn');
const dropdownMenu = document.getElementById('dropdownMenu');

menuBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  dropdownMenu.classList.toggle('active');
  menuBtn.classList.toggle('active-btn');
});

document.addEventListener('click', () => {
  dropdownMenu.classList.remove('active');
  menuBtn.classList.remove('active-btn');
});

// 2. GLOBAL FUNCTION UNTUK MENGINTIP PASSWORD
window.togglePasswordVisibility = function(inputId, buttonEl) {
  const inputField = document.getElementById(inputId);
  if (inputField && inputField.type === "password") {
    inputField.type = "text";
    buttonEl.textContent = "🔒";
  } else if (inputField) {
    inputField.type = "password";
    buttonEl.textContent = "👁️";
  }
}

// =========================================================================
// 3. CORE SYSTEM GOOGLE FIREBASE SDK v12.15.0
// =========================================================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
import { getAuth, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDMyCH_S50p0G9J_Fdq9MEMnNXXfXCeEcE",
  authDomain: "all-animation-studio.firebaseapp.com",
  projectId: "all-animation-studio",
  storageBucket: "all-animation-studio.firebasestorage.app",
  messagingSenderId: "225632884885",
  appId: "1:225632884885:web:3c54667fa18f2078f4a39c",
  measurementId: "G-T99JHNM9HB"
};

// Inisialisasi Firebase Core App
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

const auth = getAuth(app);
const db = getFirestore(app);

// Variabel penentu waktu penanggalan WIB
const opsiTanggal = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };

// =========================================================================
// 4. LOGIKA PROSES PENDAFTARAN MANUAL + ROBOT OTP VIA GOOGLE SCRIPT
// =========================================================================
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const usernameInput = document.getElementById('username').value.trim();
  const emailInput = document.getElementById('email').value.trim();
  const passwordInput = document.getElementById('password').value;
  const confirmPasswordInput = document.getElementById('confirmPassword').value;

  if (passwordInput !== confirmPasswordInput) {
    alert("Gagal daftar, cok! Password lu kaga cocok.");
    return;
  }

  try {
    // A. Daftarkan dulu akunnya ke sistem Firebase Auth
    const userCredential = await createUserWithEmailAndPassword(auth, emailInput, passwordInput);
    const user = userCredential.user;

    // B. Generate 6 Digit Angka OTP Acak
    const generateOTP = Math.floor(100000 + Math.random() * 900000).toString();
    const tanggalRegistrasi = new Date().toLocaleDateString('id-ID', opsiTanggal) + ' WIB';

    // C. PANGGIL ROBOT GOOGLE SCRIPT LU UNTUK KIRIM EMAIL
    // URL ini diambil dari Web App /exec hasil deploy lu tadi
    const urlRobotGoogle = "https://script.google.com/macros/s/AKfycbz25NYHgHu5jO5u-8Ycf0oz9XR0TUjxFYs3eUpDx3SrMXqRty1ozFfs0T2ocvVh1x-UJw/exec";

    await fetch(urlRobotGoogle, {
      method: "POST",
      mode: "no-cors", // Penting biar bypass aturan CORS browser
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: emailInput,
        otp: generateOTP
      })
    });

    // D. Simpan data user beserta KODE OTP-nya ke Firestore biar bisa divalidasi nanti
    await setDoc(doc(db, "users", user.uid), {
      username: usernameInput,
      email: emailInput,
      status: "Belum Verifikasi", // Diubah belum verifikasi sebelum isi OTP
      tanggalDaftar: tanggalRegistrasi,
      otp_code: generateOTP // Kode OTP disave di sini buat dicocokin nanti
    });

    alert("Registrasi sukses, cok! Kode OTP angka 6 digit telah dikirim langsung oleh robot ke Gmail Anda. Silakan cek kotak masuk/spam.");
    
    // Alihkan ke halaman verifikasi OTP buatan lu sendiri (misal: verifikasi.html)
    window.location.href = "verifikasi"; 

  } catch (error) {
    console.error("Error Sistem: ", error);
    alert("Gagal daftar, cok! Error: " + error.message);
  }
});

// =========================================================================
// 5. PENDAFTARAN INSTAN VIA GOOGLE POPUP (TETAP SAMA)
// =========================================================================
document.getElementById('btnGoogleRegister').addEventListener('click', async () => {
  const provider = new GoogleAuthProvider();
  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    const userDocRef = doc(db, "users", user.uid);
    const userDocSnap = await getDoc(userDocRef);

    if (!userDocSnap.exists()) {
      const tanggalRegistrasi = new Date().toLocaleDateString('id-ID', opsiTanggal) + ' WIB';

      await setDoc(userDocRef, {
        email: user.email,
        status: "Aktif",
        tanggalDaftar: tanggalRegistrasi,
        loginMethod: "google",
        otp_status: "need_refresh"
      });
      
      alert("Pendaftaran akun Google sukses, cok! Sesi Anda siap.");
    } else {
      alert("Akun Google ini sudah terdaftar sebelumnya, langsung dialihkan!");
    }

    window.location.href = "Login";

  } catch (error) {
    console.error("Google Auth Registration Error: ", error);
    alert("Gagal daftar via Google, cok! Hubungi admin.");
  }
});
  </script>
</body>
</html>
