<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - All Animation Studio</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css style/nevbar.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* BACKGROUND UTAMA: HITAM PEKAT */
    body {
      background-color: #050608;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* NAVBAR UTAMA */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(13, 15, 19, 0.75);
      backdrop-filter: blur(8px);
      padding: 12px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0, 243, 255, 0.15);
      border-bottom: 1px solid rgba(102, 252, 241, 0.25);
      height: 70px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      flex-grow: 1;
      height: 100%;
    }

    /* TOMBOL MENU / GARIS TIGA */
    .menu-toggle {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      width: 40px;
      height: 40px;
      background-color: rgba(102, 252, 241, 0.03);
      border-radius: 50%;
      border: 1px solid rgba(102, 252, 241, 0.25);
      flex-shrink: 0;
      z-index: 1010;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .menu-toggle:hover { background-color: rgba(102, 252, 241, 0.12); box-shadow: 0 0 15px rgba(102, 252, 241, 0.35); }
    .menu-toggle span { width: 18px; height: 2px; background-color: #66fcf1; border-radius: 2px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    
    .menu-toggle.active-btn span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .menu-toggle.active-btn span:nth-child(2) { opacity: 0; transform: scale(0); }
    .menu-toggle.active-btn span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    /* MENU DROPDOWN */
    .dropdown-menu {
      position: absolute;
      top: 75px; right: 20px;
      background-color: #12141c;
      border: 1px solid #66fcf1;
      border-radius: 12px;
      width: 200px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.65), 0 0 15px rgba(102, 252, 241, 0.15);
      overflow: hidden;
      z-index: 1000;
      opacity: 0;
      transform: translateY(-25px) scale(0.93);
      pointer-events: none;
      transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .dropdown-menu.active { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
    .dropdown-menu a { display: block; color: white; padding: 14px 20px; text-decoration: none; font-size: 0.95rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s; cursor: pointer; }
    .dropdown-menu a:hover { background-color: rgba(102, 252, 241, 0.08); color: #66fcf1; padding-left: 26px; }

    /* HERO LAYAR UTAMA */
    .hero-wrapper {
      height: calc(100vh - 70px); 
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: radial-gradient(circle at center, #0d1117 0%, #050608 100%);
    }

    .login-form-wrapper {
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 3px;
      margin-bottom: 35px;
      color: #ffffff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
    }

    /* Input Neon Modern */
    .custom-input-box {
      width: 100%;
      position: relative;
      margin-bottom: 25px;
    }

    .custom-input-box input {
      width: 100%;
      padding: 15px 50px 15px 18px; 
      background: rgba(18, 20, 28, 0.6);
      border: 1px solid rgba(102, 252, 241, 0.2);
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      font-family: sans-serif;
      outline: none;
      transition: all 0.3s ease;
    }

    .custom-input-box input:focus {
      border-color: #66fcf1;
      box-shadow: 0 0 12px rgba(102, 252, 241, 0.3);
    }

    .custom-input-box label {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
      letter-spacing: 1.5px;
      font-family: 'Orbitron', sans-serif;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .custom-input-box input:focus ~ label,
    .custom-input-box input:not(:placeholder-shown) ~ label {
      top: -10px;
      left: 12px;
      background: #060810;
      padding: 0 6px;
      color: #66fcf1;
      font-size: 10px;
    }

    /* TOMBOL MATA INTIP PW */
    .toggle-password-btn {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(102, 252, 241, 0.6);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      outline: none;
      z-index: 10;
      user-select: none;
    }
    .toggle-password-btn:hover { color: #66fcf1; }

    /* Tombol Sign-In Efek Aliran Pelangi */
    .btn-submit-rainbow {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 8px;
      color: #ffffff;
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      background: linear-gradient(90deg, #ff0055, #00ffcc, #9900ff, #ffcc00, #ff0055);
      background-size: 300% 100%;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
      animation: rainbowBtnShift 4s linear infinite;
    }

    .btn-submit-rainbow:hover {
      transform: scale(1.01);
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
    }

    /* STYLE TOMBOL GOOGLE LOGIN */
    .btn-google-signin {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      background-color: #1a1e29;
      color: #ffffff;
      border: 1px solid rgba(102, 252, 241, 0.3);
      border-radius: 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.3s ease;
    }

    .btn-google-signin img { width: 18px; height: 18px; }

    @keyframes rainbowBtnShift {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    .register-home-link {
      display: inline-block;
      margin-top: 25px;
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 2px;
      font-family: 'Orbitron', sans-serif;
      transition: color 0.3s ease;
    }

    .register-home-link:hover { color: #66fcf1; }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo-area">
      <div class="logo-aa-container">
        <span class="char-a a-normal">A</span>
        <span class="char-a a-flipped">A</span>
      </div>
      
      <div class="text-wrapper">
        <span class="logo-text-top">
          <span class="gold-a">A</span>LL <span class="gold-a">A</span>NIMATION
        </span>
        <span class="logo-text-bottom">STUDIO</span>
      </div>
    </div>    

    <div class="menu-toggle" id="menuBtn"><span></span><span></span><span></span></div>
    <div class="dropdown-menu" id="dropdownMenu">
      <a href="index.html">🏠 Beranda</a>
      <a href="Animasi Studio/studio">🎬 Animasi Studio</a>
      <a href="registrasi.html">🆕 Register</a> 
    </div>
  </header>

  <section class="hero-wrapper">
    <div class="login-form-wrapper">
      <h2 class="login-title">USER LOGIN</h2>

      <form id="loginForm">
        <div class="custom-input-box">
          <input type="email" id="username" placeholder=" " required autocomplete="off">
          <label for="username">EMAIL ADDRESS</label>
        </div>

        <div class="custom-input-box">
          <input type="password" id="password" placeholder=" " required>
          <label for="password">PASSWORD</label>
          <button type="button" class="toggle-password-btn" id="togglePassword">👁️</button>
        </div>

        <button type="submit" class="btn-submit-rainbow">Login</button>
        
        <button type="button" class="btn-google-signin" id="btnGoogle">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo">
          MASUK DENGAN GOOGLE
        </button>
      </form>

      <a href="registrasi.html" class="register-home-link">register your account</a>
    </div>
  </section>

  <script type="module">
    // FIX: Mengembalikan ke Versi Stabil yang Valid (10.7.1)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDMyCH_S50p0G9J_Fdq9MEMnNXXfXCeEcE",
      authDomain: "all-animation-studio.firebaseapp.com",
      projectId: "all-animation-studio",
      storageBucket: "all-animation-studio.firebasestorage.app",
      messagingSenderId: "225632884885",
      appId: "1:225632884885:web:3c54667fa18f2078f4a39c",
      measurementId: "G-T99JHNM9HB"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // =========================================================================
    // BARU: OTOMATIS CEK HASIL REDIRECT KETIKA HALAMAN KEMBALI DARI GOOGLE
    // =========================================================================
    getRedirectResult(auth)
      .then(async (result) => {
        if (result && result.user) {
          const emailValue = result.user.email;

          // Jalankan pengecekan ke database Firestore 'users'
          const q = query(collection(db, "users"), where("email", "==", emailValue.toLowerCase()));
          const querySnapshot = await getDocs(q);

          if (querySnapshot.empty) {
            alert("Akun Google belum terdaftar! Silahkan lakukan registrasi terlebih dahulu.");
            sessionStorage.clear();
            window.location.href = "registrasi.html";
          } else {
            sessionStorage.removeItem("tempPassword");
            sessionStorage.removeItem("passwordStatus");
            sessionStorage.setItem("tempEmail", emailValue);
            sessionStorage.setItem("loginMethod", "google");

            window.location.href = "validation.html";
          }
        }
      })
      .catch((error) => {
        console.error("Redirect Auth Error:", error.message);
        alert("Gagal memproses login Google: " + error.message);
      });

    // =========================================================================
    // MEMPERTAHANKAN DATA KOLOM
    // =========================================================================
    const emailField = document.getElementById("username");
    const passwordInput = document.getElementById('password');

    const savedEmail = sessionStorage.getItem("tempEmail");
    const savedPassword = sessionStorage.getItem("tempPassword");
    const passwordStatus = sessionStorage.getItem("passwordStatus");

    if (savedEmail && emailField) {
      emailField.value = savedEmail;
    }
    
    if (passwordStatus === "wrong") {
      sessionStorage.removeItem("tempPassword");
      if (passwordInput) passwordInput.value = "";
    } else {
      if (savedPassword && passwordInput) {
        passwordInput.value = savedPassword;
      }
    }

    // 1. LOGIKA TOMBOL MATA INTIP PASSWORD
    const togglePasswordBtn = document.getElementById('togglePassword');
    togglePasswordBtn.addEventListener('click', () => {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        togglePasswordBtn.textContent = '🔒';
      } else {
        passwordInput.type = 'password';
        togglePasswordBtn.textContent = '👁️';
      }
    });

    // 2. SISTEM SUBMIT LOGIN MANUAL
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();

      const emailValue = emailField.value.trim();
      const passwordValue = passwordInput.value;
      
      sessionStorage.removeItem("passwordStatus");
      sessionStorage.setItem("tempEmail", emailValue);
      sessionStorage.setItem("tempPassword", passwordValue);
      sessionStorage.setItem("loginMethod", "email_password");

      window.location.href = "validation.html";
    });

    // 3. LOGIKA TOMBOL GOOGLE AUTH (MENGGUNAKAN REDIRECT)
    const btnGoogle = document.getElementById('btnGoogle');
    btnGoogle.addEventListener('click', (e) => {
      e.preventDefault(); // Mencegah form ke-submit / refresh halaman secara tidak sengaja
      signInWithRedirect(auth, provider);
    });

    // 4. SISTEM NAVBAR DROPDOWN
    const menuBtn = document.getElementById('menuBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');
    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdownMenu.classList.toggle('active');
      menuBtn.classList.toggle('active-btn');
    });

    document.addEventListener('click', () => {
      dropdownMenu.classList.remove('active');
      menuBtn.classList.remove('active-btn');
    });
  </script>
</body>
</html>
